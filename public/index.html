<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vivek chat app</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1>Chatting App By Vivek</h1>
    <div class="chat-container">
      <ul id="messages"></ul>
    </div>
    <form id="myform">
      <!-- <label for="input">Message</label> -->
       <!-- <div id="gallery"></div> -->
      <input type="text" placeholder="Messages" id="input" autocomplete="off" />
      <input type="file" id="fileInput" accept="image/*"  />
      <button id="sendbtn">➤</button>
      <button id="toggle-btn">Disconnect</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const input = document.querySelector("#input");
      const btn = document.querySelector("#sendbtn");
      const toggleBtn = document.querySelector("#toggle-btn");

      const fileInput = document.getElementById('fileInput')

      btn.addEventListener("click", (e) => {
        e.preventDefault();
        // for post data......
        socket.emit("chat-message", {
          message:input.value.trim(),
          image:fileInput.files[0] });
        input.value = "";
      });

      //  recive data......
      socket.on("receive-chat", (data,senderId) => {
        if(data.message && data.image){
        const li = document.createElement("li");
        const lil = document.createElement("li");
        li.innerText = data.message;
        
        if(data.image){
          const blob = new Blob([data.image])
          const url = URL.createObjectURL(blob)
          const img = document.createElement('img')
          img.src=url;
          img.style.width='150px'
          lil.appendChild(img)
          console.log(lil);
        }
        // console.log(senderId);

        if (senderId === socket.id) {
          li.classList.add("my-message");
          lil.classList.add("my-message");
        } else {
          li.classList.add("other-message");
          lil.classList.add("other-message");
        }

        document.querySelector("#messages").appendChild(li);
        document.querySelector("#messages").appendChild(lil);

        // ! auto scroll
        const chatContainer = document.querySelector('.chat-container')
        chatContainer.scrollTop = chatContainer.scrollHeight
      }else if(data.message){
        const li = document.createElement("li");
        
        li.innerText = data.message;

        if (senderId === socket.id) {
          li.classList.add("my-message");
        } else {
          li.classList.add("other-message");
        }

        document.querySelector("#messages").appendChild(li);

        // ! auto scroll
        const chatContainer = document.querySelector('.chat-container')
        chatContainer.scrollTop = chatContainer.scrollHeight
      }else if(data.image){
        console.log(data.image);
        
        const li = document.createElement("li");
       
        
        if(data.image){
          const blob = new Blob([data.image])
          const url = URL.createObjectURL(blob)
          const img = document.createElement('img')
          img.src=url;
          img.style.width='150px'
          li.appendChild(img)
          console.log(li);
        }
        // console.log(senderId);

        if (senderId === socket.id) {
          li.classList.add("my-message");
        } else {
          li.classList.add("other-message");
        }
        document.querySelector("#messages").appendChild(li);

        // ! auto scroll
        const chatContainer = document.querySelector('.chat-container')
        chatContainer.scrollTop = chatContainer.scrollHeight
      }

    });

      toggleBtn.addEventListener("click", (e) => {
        e.preventDefault();
        if (socket.connected) {
          toggleBtn.innerHTML = "Connect";
          socket.disconnect();
        } else {
          toggleBtn.innerHTML = "Disconnect";
          socket.connect();
        }
      });
    </script>
  </body>
</html>
