<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vivek chat app</title>
    <link rel="shortcut icon" href="./assects/whatsapp-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1>Chatting App By Vivek</h1>
    <div class="chat-container">
      <ul id="messages"></ul>
    </div>
    <form id="myform">
      <!-- <label for="input">Message</label> -->
       <!-- <div id="gallery"></div> -->
      <input type="text" placeholder="Messages" id="input" autocomplete="off" />
      <div class="file-input">
        <input type="file" id="fileInput" class="file" accept="image/*"  />
        <label for="fileInput"><img src="./assects/share (1).png" alt="share image" class="shareImage"></label>
      </div>
      <button id="sendbtn">➤</button>
      <button id="toggle-btn">Disconnect</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    
  </body>
</html>
